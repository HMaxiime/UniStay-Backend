services:
  - type: web
    name: unistay-backend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
